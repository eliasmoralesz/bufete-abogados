<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" />
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;600&family=Lora:wght@600&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0A1F44" />
    <meta
      name="description"
      content="Especialista en derecho migratorio y notarial en Costa Rica con más de 12 años de experiencia. Asesoría clara y resultados reales para sus trámites."
      data-default="true"
    />
    <link rel="apple-touch-icon" href="/logo192.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>Abogado Migratorio en Costa Rica | Daguer Hernández</title>
    <link rel="canonical" href="https://daguerhernandez.com/" data-default="true" />

    <!-- Open Graph / redes sociales: en el HTML estático porque WhatsApp, Facebook,
         LinkedIn, etc. no ejecutan JavaScript y no ven las tags que inyecta React Helmet.
         data-default: se eliminan apenas React monta (ver src/index.jsx) para que no
         queden duplicadas con las que Helmet inyecta por ruta/idioma — los bots que no
         ejecutan JS nunca llegan a correr esa limpieza, así que igual las ven. -->
    <meta property="og:type" content="website" data-default="true" />
    <meta property="og:site_name" content="Daguer Hernández Abogado" data-default="true" />
    <meta property="og:title" content="Abogado Migratorio en Costa Rica | Daguer Hernández" data-default="true" />
    <meta property="og:description" content="Especialista en derecho migratorio y notarial en Costa Rica con más de 12 años de experiencia. Asesoría clara y resultados reales para sus trámites." data-default="true" />
    <meta property="og:url" content="https://daguerhernandez.com/" data-default="true" />
    <meta property="og:image" content="https://daguerhernandez.com/og-image.webp" data-default="true" />
    <meta property="og:image:width" content="1200" data-default="true" />
    <meta property="og:image:height" content="1200" data-default="true" />
    <meta property="og:locale" content="es_CR" data-default="true" />

    <meta name="twitter:card" content="summary_large_image" data-default="true" />
    <meta name="twitter:title" content="Abogado Migratorio en Costa Rica | Daguer Hernández" data-default="true" />
    <meta name="twitter:description" content="Especialista en derecho migratorio y notarial en Costa Rica con más de 12 años de experiencia." data-default="true" />
    <meta name="twitter:image" content="https://daguerhernandez.com/og-image.webp" data-default="true" />
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <!-- Vanta DOTS y THREE.js desde CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r121/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.dots.min.js"></script>
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
